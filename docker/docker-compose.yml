services:
  mongodb:
    image: mongo:6.0
    container_name: copilot_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: copilot_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - copilot_network

  redis:
    image: redis:7.0-alpine
    container_name: copilot_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - copilot_network

  rabbitmq:
    image: rabbitmq:3.11-management-alpine
    container_name: copilot_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - copilot_network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  copilot_network:
    driver: bridge
