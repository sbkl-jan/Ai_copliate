services:
  mongodb:
    image: mongo:6.0
    container_name: prod_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - prod_mongo_data:/data/db
    networks:
      - copilot_prod_network

  redis:
    image: redis:7-alpine
    container_name: prod_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - prod_redis_data:/data
    networks:
      - copilot_prod_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: prod_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - prod_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - copilot_prod_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prod_express_gateway
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/copilot_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      JWT_SECRET: prod_secret_signature_key_to_be_rotated
      JWT_REFRESH_SECRET: prod_refresh_signature_key_to_be_rotated
      SOCKET_CORS_ORIGIN: "http://localhost:5173"
      SPRING_BOOT_URL: "http://springboot:8080"
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    networks:
      - copilot_prod_network

  springboot:
    build:
      context: ./microservices/spring-boot-service
      dockerfile: Dockerfile
    container_name: prod_spring_service
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PORT: 8080
      SPRING_MONGO_URI: mongodb://mongodb:27017/copilot_db
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    networks:
      - copilot_prod_network

  ai-agent:
    build:
      context: ./microservices/ai-agent-service
      dockerfile: Dockerfile
    container_name: prod_ai_agent_worker
    restart: always
    environment:
      MONGO_URI: mongodb://mongodb:27017/copilot_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      OPENAI_API_KEY: your_openai_api_key_here
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - copilot_prod_network

volumes:
  prod_mongo_data:
  prod_redis_data:
  prod_rabbitmq_data:

networks:
  copilot_prod_network:
    driver: bridge
